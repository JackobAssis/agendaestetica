<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgendaEstética - Login / Cadastro</title>
    <link rel="stylesheet" href="../styles/main.css">
    <style>
        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: var(--color-background);
        }

        .login-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-6);
            background: linear-gradient(135deg, 
                var(--color-background) 0%,
                rgba(139, 92, 246, 0.05) 100%);
        }

        .login-box {
            width: 100%;
            max-width: 420px;
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            padding: var(--spacing-8);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .login-header {
            text-align: center;
            margin-bottom: var(--spacing-8);
        }

        .login-logo {
            font-size: 3rem;
            margin-bottom: var(--spacing-2);
        }

        .login-header h1 {
            color: var(--color-text-primary);
            margin: var(--spacing-2) 0;
            font-size: 1.75rem;
            font-weight: 700;
        }

        .login-header p {
            color: var(--color-text-secondary);
            margin: 0;
            font-size: 0.875rem;
        }

        .toggle-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-2);
            margin-bottom: var(--spacing-6);
        }

        .toggle-btn {
            padding: var(--spacing-3) var(--spacing-4);
            border: 1.5px solid var(--color-border);
            background: transparent;
            color: var(--color-text-secondary);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 500;
            font-size: 0.875rem;
            transition: all 0.2s ease;
        }

        .toggle-btn:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        .toggle-btn.active {
            background: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }

        #mensagem {
            padding: var(--spacing-3) var(--spacing-4);
            border-radius: var(--radius-md);
            margin-bottom: var(--spacing-4);
            font-size: 0.875rem;
            display: none;
        }

        #mensagem.hidden {
            display: none;
        }

        #mensagem.visible {
            display: block;
        }

        #mensagem.erro {
            background: rgba(239, 68, 68, 0.1);
            color: var(--color-error);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        #mensagem.sucesso {
            background: rgba(34, 197, 94, 0.1);
            color: var(--color-success);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .login-form {
            display: none;
        }

        .login-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: var(--spacing-4);
        }

        .form-group label {
            display: block;
            margin-bottom: var(--spacing-2);
            color: var(--color-text-primary);
            font-weight: 500;
            font-size: 0.875rem;
        }

        .form-group input {
            width: 100%;
            padding: var(--spacing-3) var(--spacing-4);
            border: 1.5px solid var(--color-border);
            border-radius: var(--radius-md);
            background: var(--color-background);
            color: var(--color-text-primary);
            font-size: 0.875rem;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        .form-group input::placeholder {
            color: var(--color-text-tertiary);
        }

        .submit-btn {
            width: 100%;
            padding: var(--spacing-3) var(--spacing-4);
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: var(--spacing-4);
        }

        .submit-btn:hover {
            background: var(--color-primary-dark, #7c3aed);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .form-footer {
            text-align: center;
        }

        .form-footer a {
            color: var(--color-primary);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .form-footer a:hover {
            color: var(--color-primary-dark, #7c3aed);
            text-decoration: underline;
        }

        /* Responsivo */
        @media (max-width: 600px) {
            .login-container {
                padding: var(--spacing-4);
            }

            .login-box {
                padding: var(--spacing-6);
            }

            .login-header h1 {
                font-size: 1.5rem;
            }

            .toggle-buttons {
                gap: var(--spacing-2);
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="login-container">
            <div class="login-box">
            
            <!-- Header -->
            <div class="login-header">
                <div class="login-logo">📅</div>
                <h1>AgendaEstética</h1>
                <p style="color: var(--color-text-secondary); margin: 0;">Gerencie sua agenda online</p>
            </div>
            
            <!-- Toggle entre Login e Cadastro -->
            <div class="toggle-buttons">
                <button class="toggle-btn active" data-mode="login">Login</button>
                <button class="toggle-btn" data-mode="cadastro">Cadastro</button>
            </div>
            
            <!-- Mensagens de Erro/Sucesso -->
            <div id="mensagem" class="hidden"></div>
            
            <!-- FORMULÁRIO LOGIN -->
            <form id="form-login" class="login-form" style="display: block;">
                
                <!-- Toggle Profissional vs Cliente -->
                <div class="toggle-buttons" style="margin-bottom: var(--spacing-lg);">
                    <button type="button" class="toggle-btn active" data-role="profissional">Profissional</button>
                    <button type="button" class="toggle-btn" data-role="cliente">Cliente</button>
                </div>
                
                <!-- Email -->
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input 
                        type="email" 
                        id="login-email" 
                        name="email"
                        placeholder="seu@email.com"
                        required
                    />
                </div>
                
                <!-- Senha (visível apenas para profissional) -->
                <div class="form-group" id="grupo-senha-login" style="display: block;">
                    <label for="login-senha">Senha</label>
                    <input 
                        type="password" 
                        id="login-senha" 
                        name="senha"
                        placeholder="Mínimo 6 caracteres"
                    />
                </div>
                
                <!-- Botão Login -->
                <button type="submit" class="submit-btn">
                    <span id="login-btn-texto">Entrar</span>
                </button>
                
                <!-- Link Esqueci Senha -->
                <div class="form-footer">
                    <a href="#" id="link-esqueci-senha">Esqueci minha senha</a>
                </div>
                
            </form>
            
            <!-- FORMULÁRIO CADASTRO -->
            <form id="form-cadastro" class="login-form" style="display: none;">
                
                <!-- Toggle Profissional vs Cliente -->
                <div class="toggle-buttons" style="margin-bottom: var(--spacing-lg);">
                    <button type="button" class="toggle-btn active" data-role="profissional">Profissional</button>
                    <button type="button" class="toggle-btn" data-role="cliente">Cliente</button>
                </div>
                
                <!-- Nome -->
                <div class="form-group">
                    <label for="cadastro-nome">Nome Completo</label>
                    <input 
                        type="text" 
                        id="cadastro-nome" 
                        name="nome"
                        placeholder="Seu nome"
                        required
                    />
                </div>
                
                <!-- Email -->
                <div class="form-group">
                    <label for="cadastro-email">Email</label>
                    <input 
                        type="email" 
                        id="cadastro-email" 
                        name="email"
                        placeholder="seu@email.com"
                        required
                    />
                </div>
                
                <!-- Profissão (visível apenas para profissional) -->
                <div class="form-group" id="grupo-profissao" style="display: block;">
                    <label for="cadastro-profissao">Profissão</label>
                    <select id="cadastro-profissao" name="profissao" required>
                        <option value="">Selecione sua profissão</option>
                        <option value="cabeleireira">Cabeleireira</option>
                        <option value="esteticista">Esteticista</option>
                        <option value="barbeiro">Barbeiro</option>
                        <option value="massoterapeuta">Massoterapeuta</option>
                        <option value="manicure">Manicure</option>
                        <option value="pedicure">Pedicure</option>
                        <option value="outro">Outro</option>
                    </select>
                </div>
                
                <!-- Senha (visível apenas para profissional) -->
                <div class="form-group" id="grupo-senha-cadastro" style="display: block;">
                    <label for="cadastro-senha">Senha</label>
                    <input 
                        type="password" 
                        id="cadastro-senha" 
                        name="senha"
                        placeholder="Mínimo 6 caracteres"
                        required
                    />
                </div>
                
                <!-- Confirmar Senha (visível apenas para profissional) -->
                <div class="form-group" id="grupo-senha-confirma" style="display: block;">
                    <label for="cadastro-senha-confirma">Confirmar Senha</label>
                    <input 
                        type="password" 
                        id="cadastro-senha-confirma" 
                        name="senhaConfirma"
                        placeholder="Confirme a senha"
                        required
                    />
                </div>
                
                <!-- Termos -->
                <div class="form-group" style="margin-top: var(--spacing-lg);">
                    <label style="display: flex; gap: var(--spacing-sm); align-items: flex-start;">
                        <input 
                            type="checkbox" 
                            id="termos" 
                            name="termos"
                            required
                            style="margin-top: 3px;"
                        />
                        <span style="font-size: var(--font-size-sm); color: var(--color-text-secondary);">
                            Concordo com os <a href="#">Termos de Serviço</a> e <a href="#">Política de Privacidade</a>
                        </span>
                    </label>
                </div>
                
                <!-- Botão Cadastro -->
                <button type="submit" class="submit-btn">
                    <span id="cadastro-btn-texto">Criar Conta</span>
                </button>
                
            </form>
            
            </div>
        </div>
    </div>
    
    <script type="module" src="./login.js"></script>
</body>
</html>
