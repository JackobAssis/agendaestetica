<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgendaEstética - Dashboard</title>
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/theme.css">
    <link rel="stylesheet" href="../styles/dashboard.css">
</head>
<body>
    <div id="app">
        <div class="dashboard-screen">
            <header class="page-header">
                <div>
                    <p class="eyebrow">AgendaEstética</p>
                    <h1>Dashboard</h1>
                </div>
                <button id="btn-logout" class="btn-secondary">Sair</button>
            </header>

            <section class="next-appointment-card">
                <div class="card-top">
                    <div>
                        <p class="eyebrow">Próximo atendimento</p>
                        <h2 id="next-appointment-title">Sem agendamento para hoje</h2>
                    </div>
                    <span class="appointment-status status-confirmado">Confirmado</span>
                </div>
                <p id="next-appointment-meta" class="muted-text">Mais recente na sua agenda</p>
                <div class="appointment-info-row">
                    <div class="appointment-info-block">
                        <span class="info-label">Cliente</span>
                        <p id="next-appointment-client">-</p>
                    </div>
                    <div class="appointment-info-block">
                        <span class="info-label">Serviço</span>
                        <p id="next-appointment-service">-</p>
                    </div>
                </div>
            </section>

            <section class="appointment-panel">
                <div class="panel-header">
                    <div>
                        <p class="eyebrow">Hoje</p>
                        <h2>Lista de agendamentos</h2>
                    </div>
                    <a href="/agendamentos" class="btn-primary btn-sm">Ver agenda completa</a>
                </div>

                <div class="appointment-list" id="today-appointments">
                    <div class="empty-state">Nenhum atendimento agendado para hoje.</div>
                </div>
            </section>

            <section class="dashboard-summary">
                <div class="summary-card">
                    <p class="summary-label">Atendimentos</p>
                    <p id="count-hoje" class="summary-value">0</p>
                </div>
                <div class="summary-card">
                    <p class="summary-label">Clientes</p>
                    <p id="count-clientes" class="summary-value">0</p>
                </div>
                <div class="summary-card">
                    <p class="summary-label">Plano</p>
                    <p id="plano-atual" class="summary-value">Free</p>
                </div>
            </section>

            <a href="/agenda" class="floating-action">+ Agendar</a>
        </div>
    </div>

    <script type="module" src="../pages/dashboard.js"></script>
</body>
</html>
