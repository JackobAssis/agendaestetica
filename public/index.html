<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AgendaEstética - SaaS de Agenda Online para Profissionais Estéticos">
    <meta name="theme-color" content="#6B46C1">
    
    <title>AgendaEstética - Login</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg">
    <link rel="apple-touch-icon" href="/assets/images/favicon.svg">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="AgendaEstética">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- Polyfills para compatibilidade -->
    <script>
        // Feature detection para polyfills
        (function() {
            // Verificar se fetch está disponível
            if (!window.fetch) {
                document.write('<script src="https://unpkg.com/whatwg-fetch@3.6.2/fetch.js"><\/script>');
            }
            
            // Verificar se Promise está disponível
            if (!window.Promise) {
                document.write('<script src="https://unpkg.com/core-js-bundle@3.6.5/minified.js"><\/script>');
            }
        })();
    </script>
    
    <!-- reCAPTCHA v3 (opcional) -->
    <script src="https://www.google.com/recaptcha/api.js?render=6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI" async defer></script>
    
<link rel="stylesheet" href="/styles/main.css">
    
<!-- Firebase Configuration - INJETADO VIA BUILD -->
<script>
(function() {
    // Verificar se já existe configuração
    if (window.APP_CONFIG && window.APP_CONFIG.firebase) {
        console.log('✅ Firebase config já carregada');
        return;
    }
    
    // Configuração do Firebase - será injetada pelo build
    window.APP_CONFIG = {
        firebase: {
            apiKey: "AIzaSyDj3cSnhFusveRRzCm8OGOIboiqQjCYy94",
            authDomain: "agendaestetica-fe8b9.firebaseapp.com",
            projectId: "agendaestetica-fe8b9",
            storageBucket: "agendaestetica-fe8b9.firebasestorage.app",
            messagingSenderId: "735305856969",
            appId: "1:735305856969:web:9d28f77af9d302f2699a18"
        }
    };
    
    console.log('✅ Firebase config injetada');
})();
</script>
<!-- End Firebase Configuration -->
</head>
<body>
    <div id="app">
        <!-- Loading state -->
        <div class="loading-screen" id="loading-screen">
            <div class="loading-spinner"></div>
            <p>Carregando AgendaEstética...</p>
        </div>
    </div>
    
    <script type="module">
        // Firebase SDK imports
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js';
        import { getAuth, setPersistence, browserLocalPersistence } from 'https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js';
        import { getFirestore } from 'https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore.js';
        import { getStorage } from 'https://www.gstatic.com/firebasejs/10.5.0/firebase-storage.js';
        
        // App imports
        import firebaseConfig from './config.js';
        import { markFirebaseInitialized } from './modules/firebase.js';
        
        // ✅ Verificação RIGOROSA de configuração
        function isFirebaseConfigValid(config) {
            if (!config) return false;
            if (typeof config.apiKey !== 'string') return false;
            if (config.apiKey.length <= 10) return false;
            if (config.apiKey.includes('placeholder') || config.apiKey.includes('INJETAR')) return false;
            if (config.apiKey.includes('undefined')) return false;
            if (config.apiKey.includes('null')) return false;
            if (!config.apiKey.startsWith('AIzaSy')) return false;
            return true;
        }
        
        const isValidConfig = isFirebaseConfigValid(firebaseConfig);
        const isProduction = window.location.hostname !== 'localhost' && 
                            window.location.hostname !== '127.0.0.1';
        
        // Função para exibir tela de erro crítico
        function showCriticalError() {
            const screen = document.getElementById('loading-screen');
            screen.innerHTML = '';
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-screen';
            const h2 = document.createElement('h2');
            h2.textContent = '⚠️ Erro Crítico de Configuração';
            errorDiv.appendChild(h2);
            const p1 = document.createElement('p');
            p1.textContent = 'Firebase não está configurado corretamente.';
            errorDiv.appendChild(p1);
            const p2 = document.createElement('p');
            p2.className = 'error-details';
            p2.textContent = 'O app não pode funcionar sem configuração válida.';
            errorDiv.appendChild(p2);
            const p3 = document.createElement('p');
            const strong = document.createElement('strong');
            strong.textContent = 'Para resolver:';
            p3.appendChild(strong);
            errorDiv.appendChild(p3);
            const ul = document.createElement('ul');
            const li1 = document.createElement('li');
            li1.textContent = 'Configure VITE_FIREBASE_* no Vercel Dashboard';
            ul.appendChild(li1);
            const li2 = document.createElement('li');
            li2.textContent = 'Verifique FIREBASE-SETUP.md';
            ul.appendChild(li2);
            errorDiv.appendChild(ul);
            const p4 = document.createElement('p');
            p4.className = 'error-details';
            p4.textContent = 'Error: Firebase configuration missing';
            errorDiv.appendChild(p4);
            screen.appendChild(errorDiv);
        }
        
        // Função para exibir tela de modo demo
        function showDemoMode() {
            const screen = document.getElementById('loading-screen');
            screen.innerHTML = '';
            const demoDiv = document.createElement('div');
            demoDiv.className = 'demo-mode-screen';
            const h2 = document.createElement('h2');
            h2.textContent = '🧪 Modo Desenvolvimento';
            demoDiv.appendChild(h2);
            const p1 = document.createElement('p');
            p1.textContent = 'Firebase não configurado - modo demo.';
            demoDiv.appendChild(p1);
            const p2 = document.createElement('p');
            p2.textContent = 'Configure .env.local para testar autenticação.';
            demoDiv.appendChild(p2);
            const ul = document.createElement('ul');
            const items = ['VITE_FIREBASE_API_KEY', 'VITE_FIREBASE_AUTH_DOMAIN', 'VITE_FIREBASE_PROJECT_ID', 'VITE_FIREBASE_STORAGE_BUCKET', 'VITE_FIREBASE_MESSAGING_SENDER_ID', 'VITE_FIREBASE_APP_ID'];
            items.forEach(item => {
                const li = document.createElement('li');
                li.textContent = item;
                ul.appendChild(li);
            });
            demoDiv.appendChild(ul);
            screen.appendChild(demoDiv);
        }
        
        // Função para inicializar Firebase PRIMEIRO
        // Reference: 2.0.md > Tarefa 3 - Inicialização correta do Firebase
        async function initializeFirebaseFirst() {
            try {
                console.log('🔧 Inicializando Firebase...');
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                const db = getFirestore(app);
                const storage = getStorage(app);
                
                // Persistência
                setPersistence(auth, browserLocalPersistence)
                    .catch(error => console.warn('Persistence warning:', error.message));
                
                // Expor globalmente ANTES de carregar módulos
                window.firebaseApp = app;
                window.firebase = { app, auth, db, storage, firestore: db };
                
                // ✅ Marcar Firebase como inicializado
                // Reference: 2.0.md > Tarefa 3 - Evitar múltiplos initializeApp
                markFirebaseInitialized();
                
                console.log('✅ Firebase inicializado com sucesso');
                return { app, auth, db, storage };
            } catch (error) {
                console.error('❌ Firebase init error:', error);
                throw error;
            }
        }
        
        // Função para carregar router e verificar sessão
        async function loadApp() {
            try {
                const { setupRouter } = await import('./router.js');
                const { verificarSessao } = await import('./modules/auth.js');
                
                // Setup router
                await setupRouter();
                
                // Verificar sessão
                await verificarSessao();
                
                console.log('✅ App carregado com sucesso');
            } catch (error) {
                console.error('❌ App load error:', error);
            }
        }
        
        // ✅ Fluxo principal - inicializa Firebase primeiro
        async function main() {
            if (isValidConfig) {
                // Configuração válida - inicializar Firebase primeiro
                console.log('✅ Firebase config válida');
                try {
                    await initializeFirebaseFirst();
                    await loadApp();
                } catch (error) {
                    console.error('❌ Erro na inicialização:', error);
                    showCriticalError();
                }
            } else if (isProduction) {
                // Produção sem config válida - erro crítico
                console.error('❌ Firebase config INVÁLIDA ou AUSENTE em produção!');
                console.error('API Key:', firebaseConfig?.apiKey || 'NÃO DEFINIDA');
                showCriticalError();
                
                // Setup router mesmo assim para permitir navegação
                await loadApp();
            } else {
                // Desenvolvimento sem config - modo demo
                console.warn('⚠️ Firebase config não encontrada - modo demo');
                showDemoMode();
                
                // Setup router em modo demo
                await loadApp();
            }
        }
        
        // Iniciar aplicação
        main();
    </script>
    
    <style>
        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: var(--font-family, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
        }
        
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--color-border, #e0e0e0);
            border-top-color: var(--color-primary, #6B46C1);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .demo-mode-screen {
            text-align: center;
            padding: 24px;
            max-width: 500px;
            background: #fff3e0;
            border: 1px solid #ffb74d;
            border-radius: 8px;
        }
        
        .demo-mode-screen h2 { color: #e65100; margin-bottom: 16px; }
        .demo-mode-screen ul { text-align: left; font-size: 13px; color: #666; margin: 16px 0; }
        
        .error-screen {
            text-align: center;
            padding: 24px;
            max-width: 500px;
            background: #ffebee;
            border: 1px solid #ef5350;
            border-radius: 8px;
        }
        
        .error-screen h2 { color: #c62828; margin-bottom: 16px; }
        .error-details { font-size: 12px; color: #666; margin-top: 8px; }
    </style>
    
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then((registration) => {
                        console.log('✅ Service Worker registrado:', registration.scope);
                        
                        // Request notification permission
                        if ('Notification' in window && Notification.permission === 'default') {
                            Notification.requestPermission().then((permission) => {
                                if (permission === 'granted') {
                                    console.log('✅ Notificações permitidas');
                                }
                            });
                        }
                    })
                    .catch((error) => {
                        console.log('❌ Service Worker falhou:', error);
                    });
            });
        }
    </script>
</body>
</html>
